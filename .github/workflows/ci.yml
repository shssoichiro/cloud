name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# Optional repo/org variables for runner migration:
# - RUNNER_DEFAULT_LABEL=blacksmith-2vcpu-ubuntu-2404
# - RUNNER_LARGE_LABEL=blacksmith-8vcpu-ubuntu-2404
jobs:
  changes:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    outputs:
      kilocode_backend: ${{ steps.filter.outputs.kilocode_backend }}
      cloud_agent: ${{ steps.filter.outputs.cloud_agent }}
      cloud_agent_next: ${{ steps.filter.outputs.cloud_agent_next }}
      workspace_matrix: ${{ steps.workspaces.outputs.matrix }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            kilocode_backend:
              - 'src/**'
              - 'packages/db/**'
              - 'packages/encryption/**'
              - 'packages/trpc/**'
              - 'packages/worker-utils/**'
              - 'package.json'
              - 'tsconfig.json'
            cloud_agent:
              - 'cloud-agent/**'
            cloud_agent_next:
              - 'cloud-agent-next/**'

      - name: Detect changed workspaces with tests
        id: workspaces
        run: |
          matrix=$(scripts/changed-workspaces.sh --exclude cloud-agent --exclude cloud-agent-next)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  typecheck:
    needs: changes
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: scripts/typecheck-all.sh

  lint:
    needs: changes
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: scripts/lint-all.sh

  format-check:
    needs: changes
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: |
          pnpm run format:check || {
            echo "::error::oxfmt formatting check failed. Please run 'pnpm run format' locally and commit the changes before pushing."
            exit 1
          }

  drizzle-check:
    needs: changes
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Drizzle check
        run: pnpm drizzle check
        env:
          POSTGRES_URL: postgresql://unused:unused@localhost:5432/unused

  test:
    needs: [changes, typecheck, lint, format-check, drizzle-check]
    if: needs.changes.outputs.kilocode_backend == 'true'
    runs-on: ${{ vars.RUNNER_LARGE_LABEL || 'ubuntu-24.04-8core' }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: test
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/postgres
      POSTGRES_CONNECT_TIMEOUT: 30000
      POSTGRES_MAX_QUERY_TIME: 30000
      JEST_MAX_WORKERS: 4

    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency cycle check
        run: pnpm run dependency-cycle-check

      - name: Run tests
        run: pnpm run test

  build:
    needs: [changes, typecheck, lint, format-check, drizzle-check]
    if: needs.changes.outputs.kilocode_backend == 'true'
    runs-on: ${{ vars.RUNNER_LARGE_LABEL || 'ubuntu-24.04-8core' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Setup Vercel ENV
        run: |
          pnpm install --global vercel@latest
          vercel link --project=kilocode-app --token=${{ secrets.VERCEL_TOKEN }} --yes
          vercel env pull .env.production.local --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build application
        env:
          NODE_ENV: production
          SENTRY_AUTH_TOKEN: ''
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: pnpm run build

  cloud-agent:
    needs: [changes, typecheck, lint, format-check, drizzle-check]
    if: needs.changes.outputs.cloud_agent == 'true'
    runs-on: ${{ vars.RUNNER_LARGE_LABEL || 'ubuntu-24.04-8core' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wrapper bundle
        working-directory: cloud-agent/wrapper
        run: bun run build.ts

      - name: Run cloud-agent tests
        run: pnpm --filter cloud-agent test:all

  cloud-agent-next:
    needs: [changes, typecheck, lint, format-check, drizzle-check]
    if: needs.changes.outputs.cloud_agent_next == 'true'
    runs-on: ${{ vars.RUNNER_LARGE_LABEL || 'ubuntu-24.04-8core' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true
          ref: ${{ github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wrapper bundle
        working-directory: cloud-agent-next/wrapper
        run: bun run build.ts

      - name: Run cloud-agent-next tests
        run: pnpm --filter cloud-agent-next test:all

  workspace-tests:
    needs: [changes, typecheck, lint, format-check, drizzle-check]
    if: ${{ needs.changes.outputs.workspace_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.changes.outputs.workspace_matrix) }}
    name: test (${{ matrix.workspace.name }})
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter ${{ matrix.workspace.name }} test
