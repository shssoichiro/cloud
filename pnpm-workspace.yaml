  - unrs-resolver

minimumReleaseAge: 5760

# Storybook 9.1.17 excluded for security update - https://storybook.js.org/blog/security-advisory/
minimumReleaseAgeExclude:
  - '@storybook/addon-docs@9.1.17'
  - '@storybook/addon-links@9.1.17'
  - '@storybook/addon-themes@9.1.17'
  - '@storybook/builder-webpack5@9.1.17'
  - '@storybook/core-webpack@9.1.17'
  - '@storybook/csf-plugin@9.1.17'
  - '@storybook/global@9.1.17'
  - '@storybook/icons@9.1.17'
  - '@storybook/nextjs@9.1.17'
  - '@storybook/preset-react-webpack@9.1.17'
  - '@storybook/react@9.1.17'
  - '@storybook/react-docgen-typescript-plugin@9.1.17'
  - '@storybook/react-dom-shim@9.1.17'
  - storybook@9.1.17
  # glob@13.0.1 + minimatch@10.1.2 + @isaacs/brace-expansion@5.0.1 fix GHSA-7h2j-956f-4vf2
  - glob@13.0.1
  - minimatch@10.1.2
  - '@isaacs/brace-expansion@5.0.1'

onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - core-js-pure
  - es5-ext
  - esbuild
  - libpq
  - workerd
